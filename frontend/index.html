<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Startups</title>
  </head>
  <body>
    <form
      action="http://localhost:3000/api/startups"
      method="post"
      id="formCadastro"
    >
      <h1>Cadastrar nova Startup</h1>
      <input
        type="text"
        name="nomeFantasia"
        placeholder="Nome Fantasia"
        class="textFields"
      />
      <input type="text" name="cnpj" placeholder="CNPJ" class="textFields" />
      <input type="text" name="setor" placeholder="Setor" class="textFields" />
      <input type="submit" value="Cadastrar" id="enviar" />
    </form>
    <script src="script.js"></script>
  </body>
</html>
